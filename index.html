<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G&A LEVEL 1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="team-scoreboard" aria-label="Scores des équipes">
        <div class="team-card team-ninou">
          <span class="team-name">Ninou</span><span class="team-members">Tof &amp; Cyril</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points Ninou">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
        <div class="team-card team-loulou">
          <span class="team-name">Loulou</span><span class="team-members">Sylwia &amp; Anil</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points Loulou">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
        <div class="team-card team-davy">
          <span class="team-name">Davy</span><span class="team-members">Océan &amp; Toni</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points Davy">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
        <div class="team-card team-croquette">
          <span class="team-name">Croquette</span><span class="team-members">Adeline &amp; Olivier</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points Croquette">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
        <div class="team-card team-ta-ta">
          <span class="team-name">Ta-ta</span><span class="team-members">Cindy &amp; Jérem</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points Ta-ta">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
        <div class="team-card team-a-ten">
          <span class="team-name">A-ten !</span><span class="team-members">Angel &amp; Joao</span>
          <strong class="team-points">0</strong>
          <div class="team-controls" aria-label="Points A-ta !">
            <button class="team-score-button" type="button" data-score-delta="-1">-</button>
            <button class="team-score-button" type="button" data-score-delta="1">+</button>
          </div>
        </div>
      </aside>

      <section class="home-screen" id="homeScreen" aria-labelledby="pageTitle">
        <div class="brand-panel">
          <p class="eyebrow">Anniversaire d'Axel &amp; Gabriel</p>
          <h1 id="pageTitle">G&amp;A LEVEL 1</h1>
          <div class="score-strip" aria-label="Tableau d'ambiance">
            <span>Gabriel</span>
            <strong>&amp;</strong>
            <span>Axel</span>
          </div>
        </div>

        <nav class="activity-grid" aria-label="Activités">
          <button class="activity-card active" type="button" data-activity="moment-instant">
            <span class="activity-number">01</span>
            <span class="activity-icon">INST</span>
            <span class="activity-title">Moment Instant'</span>
            <span class="activity-subtitle">Prenez des photos instantanées</span>
          </button>
          <button class="activity-card" type="button" data-activity="chaussettes">
            <span class="activity-number">02</span>
            <span class="activity-icon">SOX</span>
            <span class="activity-title">La chasse aux chaussettes</span>
            <span class="activity-subtitle">Trouvez et reformez les paires</span>
          </button>
          <button class="activity-card" type="button" data-activity="baballes">
            <span class="activity-number">03</span>
            <span class="activity-icon">BAL</span>
            <span class="activity-title">Panier de baballes</span>
            <span class="activity-subtitle">Adresse, vitesse, précision</span>
          </button>
          <button class="activity-card" type="button" data-activity="memory">
            <span class="activity-number">04</span>
            <span class="activity-icon">PIC</span>
            <span class="activity-title">Le Memory G&amp;A</span>
            <span class="activity-subtitle">Retrouvéz les paires de photos</span>
          </button>
          <button class="activity-card" type="button" data-activity="dessin">
            <span class="activity-number">05</span>
            <span class="activity-icon">ART</span>
            <span class="activity-title">Dessine-moi un...</span>
            <span class="activity-subtitle">Un dessin, un binôme, le chrono</span>
          </button>
          <button class="activity-card" type="button" data-activity="comptines">
            <span class="activity-number">06</span>
            <span class="activity-icon">LA</span>
            <span class="activity-title">N'oubliez pas les comptines !</span>
            <span class="activity-subtitle">Retrouvéz la suite exacte</span>
          </button>
        </nav>
      </section>

      <section class="module-screen hidden" id="moduleScreen" aria-live="polite">
        <button class="back-button" type="button" id="backButton">&lt; Menu</button>
        <article class="module-panel">
          <div class="module-kicker" id="moduleNumber">Activité 01</div>
          <h2 id="moduleTitle">Le Juste G&amp;A</h2>
          <p id="moduleDescription"></p>
          <div class="module-points" id="modulePoints" hidden></div>
          <div class="activity-module-mount" id="activityModuleMount"></div>
        </article>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
